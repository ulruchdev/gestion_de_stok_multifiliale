
name: CI — Compilation & Tests

on:
  push:
    branches: [main, feature/*, fix/*]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stockmaster_dev
          POSTGRES_USER: stockmaster
          POSTGRES_PASSWORD: stockmaster
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockmaster -d stockmaster_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile
        run: mvn compile -q

      - name: Run tests with coverage
        run: mvn verify 

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/'


      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: stockmaster-jar
          path: stockmaster-bootstrap/target/*.jar
          retention-days: 7

      - name: Wait for PostgreSQL
        run: |
          echo "⏳ Attente de PostgreSQL..."
          for i in {1..30}; do
            if PGPASSWORD=stockmaster psql -h localhost -U stockmaster -d stockmaster_dev -c "SELECT 1" > /dev/null 2>&1; then
              echo "✅ PostgreSQL est prêt"
              break
            fi
            echo "  Tentative $i/30..."
            sleep 2
          done

      - name: Integration test — Vérifier que l'application démarre
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: stockmaster_dev
          DB_USERNAME: stockmaster
          DB_PASSWORD: stockmaster
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MAIL_HOST: localhost
          MAIL_PORT: 1025
          SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
          SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
        run: |
          java -Dspring.profiles.active=dev -jar stockmaster-bootstrap/target/*.jar > /tmp/app.log 2>&1 &
          APP_PID=$!
          echo "PID application : $APP_PID"
          echo "⏳ Attente du démarrage (polling toutes les 5s, timeout 120s)..."
          MAX_RETRIES=24
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Application démarrée — HTTP $HTTP_CODE"
              curl -s http://localhost:8080/actuator/health | jq . || true
              kill $APP_PID 2>/dev/null || true
              exit 0
            fi
            RETRY=$((RETRY+1))
            echo "  Tentative $RETRY/$MAX_RETRIES — HTTP $HTTP_CODE"
          done
          echo "❌ Timeout — Application non démarrée après 120s"
          echo ""
          echo "=== Dernières lignes du log applicatif ==="
          tail -100 /tmp/app.log
          kill $APP_PID 2>/dev/null || true
          exit 1

  sonar:
    name: SonarCloud Analysis
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.base_ref == 'main')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Download JaCoCo coverage report from build job
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: .

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn install -DskipTests sonar:sonar 
          -Dsonar.organization=ulruchdev
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.projectKey=gestion_de_stok_multifiliale
          -Dsonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml
          -Dsonar.coverage.exclusions=**/config/**,**/dto/**
